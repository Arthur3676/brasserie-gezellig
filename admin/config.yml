backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: nl

collections:
  - name: "nieuws"
    label: "Nieuws"
    folder: "_nieuws"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Titel"
        name: "title"
        widget: "string"
      - label: "Datum"
        name: "date"
        widget: "datetime"
      - label: "Tag"
        name: "tag"
        widget: "select"
        options: ["Menukaart", "Evenement", "Aankondiging", "Sluiting"]
      - label: "Samenvatting"
        name: "summary"
        widget: "text"
      - label: "Volledige tekst"
        name: "body"
        widget: "markdown"

  - name: "agenda"
    label: "Agenda"
    folder: "_agenda"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Titel"
        name: "title"
        widget: "string"
      - label: "Datum"
        name: "date"
        widget: "datetime"
      - label: "Tijdstip"
        name: "tijd"
        widget: "string"
        hint: "Bijv. 18:00 – 22:00"
      - label: "Omschrijving"
        name: "body"
        widget: "text"
      - label: "Label"
        name: "label"
        widget: "select"
        options: ["Aanmelden verplicht", "Gratis deelname", "Beperkt aantal plaatsen", "Gesloten"]