<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Inloggen – Brasserie Gezellig Beheer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green:#1b3320;--green2:#2a4d32;--gold:#b8892a;--gold2:#d4a23c;--cream:#f5efe4;--dark:#0f1f12;--text:#2c3a2e;--muted:#6b7d6e;--white:#ffffff;--error:#c0392b; }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
  body { font-family:'Inter',sans-serif; background:var(--dark); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .login-card { background:var(--white); border-radius:16px; padding:3rem; width:100%; max-width:420px; box-shadow:0 40px 100px rgba(0,0,0,0.4); border-top:4px solid var(--gold); }
  .brand { text-align:center; margin-bottom:2rem; }
  .brand-logo { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; color:var(--green); }
  .brand-logo span { color:var(--gold); }
  .brand-sub { font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-top:0.3rem; }
  .admin-badge { display:inline-block; background:rgba(27,51,32,0.08); border:1px solid rgba(27,51,32,0.2); color:var(--green); font-size:0.68rem; font-weight:700; padding:0.2rem 0.7rem; border-radius:50px; margin-top:0.5rem; }
  h1 { font-family:'Playfair Display',serif; font-size:1.45rem; color:var(--green); margin-bottom:0.3rem; }
  .intro { color:var(--muted); font-size:0.87rem; margin-bottom:1.8rem; }
  .form-group { margin-bottom:1.1rem; }
  label { display:block; font-size:0.71rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:0.38rem; }
  input[type="email"],input[type="password"] { width:100%; padding:0.78rem 1rem; border:1.5px solid #ddd5c4; border-radius:6px; font-size:0.93rem; font-family:'Inter',sans-serif; color:var(--text); background:var(--cream); }
  input:focus { outline:none; border-color:var(--gold); }
  .pw-wrap { position:relative; }
  .pw-toggle { position:absolute; right:0.9rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--muted); font-size:0.85rem; }
  #loginError { display:none; background:#fdf1f0; border:1px solid #e8b4ae; color:var(--error); border-radius:6px; padding:0.7rem 1rem; font-size:0.85rem; margin-bottom:1.2rem; }
  .btn-submit { width:100%; padding:0.9rem; background:var(--gold); color:var(--dark); border:none; border-radius:6px; font-size:0.9rem; font-weight:700; font-family:'Inter',sans-serif; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:0.5rem; margin-top:0.5rem; }
  .btn-submit:hover:not(:disabled) { background:var(--gold2); }
  .btn-submit:disabled { opacity:0.6; }
  .spinner { display:none; width:16px; height:16px; border:2px solid rgba(0,0,0,0.2); border-top-color:var(--dark); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .divider { border:none; border-top:1px solid #e8e0d4; margin:1.8rem 0 1.2rem; }
  .card-footer { text-align:center; font-size:0.78rem; color:var(--muted); }
  .card-footer a { color:var(--gold); text-decoration:none; }
  .forgot { text-align:right; margin-top:0.3rem; }
  .forgot a { font-size:0.78rem; color:var(--muted); text-decoration:none; }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-logo">Brasserie <span>Gezellig</span></div>
    <div class="brand-sub">Beheer omgeving</div>
    <div class="admin-badge">Intern gebruik</div>
  </div>
  <h1>Welkom terug</h1>
  <p class="intro">Log in om verder te gaan naar het dashboard.</p>
  <div id="loginError"></div>
  <div class="form-group">
    <label for="email">E-mailadres</label>
    <input type="email" id="email" placeholder="naam@brasseriegezellig.nl" autocomplete="email" autofocus>
  </div>
  <div class="form-group">
    <label for="password">Wachtwoord</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <button class="pw-toggle" id="pwToggle" type="button">👁</button>
    </div>
    <div class="forgot"><a href="#" id="forgotLink">Wachtwoord vergeten?</a></div>
  </div>
  <button class="btn-submit" id="loginBtn" type="button">
    <span class="spinner" id="spinner"></span>
    <span id="btnLabel">Inloggen</span>
  </button>
  <hr class="divider">
  <div class="card-footer"><a href="/">Terug naar de website</a></div>
</div>
<script type="module">
  import { supabase } from './supabase-client.js';
  const { data: { session } } = await supabase.auth.getSession();
  if (session) redirectByRole(session.user);
  function showError(msg) { const el = document.getElementById('loginError'); el.textContent = msg; el.style.display = 'block'; }
  function hideError() { document.getElementById('loginError').style.display = 'none'; }
  function setLoading(on) { document.getElementById('loginBtn').disabled = on; document.getElementById('spinner').style.display = on ? 'block' : 'none'; document.getElementById('btnLabel').textContent = on ? 'Bezig...' : 'Inloggen'; }
  async function redirectByRole(user) {
    const { data: profile } = await supabase.from('profiles').select('role').eq('id', user.id).single();
    if (!profile) { showError('Geen rol gevonden.'); await supabase.auth.signOut(); return; }
    if (profile.role === 'admin') window.location.href = '/admin/dashboard.html';
    else if (profile.role === 'medewerker') window.location.href = '/admin/medewerker-dashboard.html';
    else { showError('Onbekende rol.'); await supabase.auth.signOut(); }
  }
  async function doLogin() {
    hideError();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showError('Vul uw e-mailadres en wachtwoord in.'); return; }
    setLoading(true);
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { setLoading(false); showError(error.message.includes('Invalid login') ? 'Onjuist e-mailadres of wachtwoord.' : 'Inloggen mislukt: ' + error.message); return; }
    await redirectByRole(data.user);
  }
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
  document.getElementById('pwToggle').addEventListener('click', () => { const pw = document.getElementById('password'); const h = pw.type==='password'; pw.type=h?'text':'password'; document.getElementById('pwToggle').textContent=h?'🙈':'👁'; });
  document.getElementById('forgotLink').addEventListener('click', async e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) { showError('Vul eerst uw e-mailadres in.'); return; }
    const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/admin/reset-password.html' });
    if (error) showError('Kon resetmail niet versturen.'); else alert('Resetlink verstuurd!');
  });
</script>
</body>
</html>
